<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Night Blog</title>

<style>

/* 기본 설정 */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg,#0b0f1a,#05070d);
    color:#eaeaea;
    min-height:100vh;
}

/* 야경 느낌 별 */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
        radial-gradient(2px 2px at 20% 30%, white, transparent),
        radial-gradient(1px 1px at 70% 80%, white, transparent),
        radial-gradient(1px 1px at 40% 60%, white, transparent),
        radial-gradient(2px 2px at 90% 20%, white, transparent);
    opacity:0.25;
    pointer-events:none;
}

/* 전체 레이아웃 */
.container{
    display:flex;
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    gap:40px;
}

/* 프로필 영역 */
.sidebar{
    width:260px;
}

.profile-card{
    background:#0f172a;
    border-radius:12px;
    padding:25px;
    box-shadow:0 0 15px rgba(0,150,255,0.2);
}

.profile-img{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#1e293b;
    margin-bottom:15px;
}

.profile-name{
    font-size:20px;
    font-weight:bold;
    margin-bottom:8px;
}

.profile-desc{
    font-size:14px;
    color:#94a3b8;
    line-height:1.5;
}

/* 게시글 영역 */
.main{
    flex:1;
}

/* 블로그 타이틀 */
.blog-title{
    font-size:32px;
    margin-bottom:30px;
    font-weight:700;
    color:#e2e8f0;
}

/* 게시글 카드 */
.post{
    background:#020617;
    padding:25px;
    border-radius:12px;
    margin-bottom:20px;
    border:1px solid #0f172a;
    transition:all .3s;
}

.post:hover{
    transform:translateY(-4px);
    border-color:#38bdf8;
    box-shadow:0 0 15px rgba(56,189,248,0.3);
}

.post-title{
    font-size:20px;
    margin-bottom:10px;
}

.post-title a{
    color:#38bdf8;
    text-decoration:none;
}

.post-title a:hover{
    text-decoration:underline;
}

.post-desc{
    font-size:14px;
    color:#94a3b8;
}

.post-date{
    font-size:12px;
    color:#64748b;
    margin-top:10px;
}

/* 반응형 */
@media(max-width:900px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<!-- 프로필 -->
<aside class="sidebar">

<div class="profile-card">

<div class="profile-img"></div>

<div class="profile-name">
Night Dev
</div>

<div class="profile-desc">
10년차 개발자.  
밤에 코딩하는 걸 좋아합니다 🌙  
Backend / DevOps / System Design
</div>

</div>

</aside>


<!-- 게시글 영역 -->
<main class="main">

<div class="blog-title">
🌌 Dev Night Blog
</div>

<article class="post">

<div class="post-title">
<a href="#">Node.js 성능 최적화 정리</a>
</div>

<div class="post-desc">
실제 서비스에서 적용했던 Node.js 성능 개선 방법 정리
</div>

<div class="post-date">
2026.03.15
</div>

</article>


<article class="post">

<div class="post-title">
<a href="#">Docker 실무에서 쓰는 패턴</a>
</div>

<div class="post-desc">
개발환경과 운영환경을 분리하는 Docker 전략
</div>

<div class="post-date">
2026.03.10
</div>

</article>


<article class="post">

<div class="post-title">
<a href="#">Spring Boot 아키텍처 설계</a>
</div>

<div class="post-desc">
대규모 서비스에서 사용하는 레이어 구조
</div>

<div class="post-date">
2026.03.05
</div>

</article>

</main>

</div>

</body>
</html>
